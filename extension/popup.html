<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Wardrobe Twin Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 480px;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8f9fa;
      color: #212529;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
    }
    .status.connected { background: #d3f9d8; color: #2b8a3e; }
    .status.disconnected { background: #ffe3e3; color: #c92a2a; }
    .product-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      padding: 12px;
      margin-bottom: 12px;
    }
    .product-card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .product-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .product-brand { font-size: 11px; color: #868e96; }
    .product-price { font-size: 14px; font-weight: 700; color: #4263eb; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #4263eb; color: white; }
    .btn-primary:hover { background: #3b5bdb; }
    .btn-primary:disabled { background: #adb5bd; cursor: not-allowed; }
    .btn-secondary { background: #e9ecef; color: #495057; margin-top: 8px; }
    .btn-secondary:hover { background: #dee2e6; }
    .result-card {
      background: white;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      padding: 12px;
      margin-top: 12px;
    }
    .result-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
    .loading { text-align: center; padding: 24px; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #4263eb;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c92a2a; font-size: 12px; margin-top: 8px; }
    .mix-match-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
      border-bottom: 1px solid #f1f3f5;
    }
    .score { color: #4263eb; font-weight: 600; }
    .no-product { text-align: center; color: #adb5bd; padding: 32px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>👗 Wardrobe Twin</h1>
    <span id="status" class="status disconnected">Disconnected</span>
  </div>

  <div id="noProduct" class="no-product">
    <p>👀 Navigate to a clothing product page to try it on</p>
    <p style="margin-top: 8px; font-size: 11px; color: #ced4da;">Supported: Shopee, Lazada, Zara, H&M, ASOS</p>
  </div>

  <div id="productCard" class="product-card" style="display: none;">
    <img id="productImage" src="" alt="Product" />
    <div class="product-title" id="productTitle"></div>
    <div class="product-brand" id="productBrand"></div>
    <div class="product-price" id="productPrice"></div>
    <button id="tryonBtn" class="btn btn-primary" style="margin-top: 12px;">✨ Virtual Try-On</button>
    <button id="mixMatchBtn" class="btn btn-secondary">🔗 Find Mix-Matches</button>
  </div>

  <div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p style="font-size: 12px; color: #868e96;">Generating try-on...</p>
  </div>

  <div id="resultCard" class="result-card" style="display: none;">
    <img id="resultImage" src="" alt="Try-on result" />
    <div id="sizeRecommendation" style="font-size: 12px; font-weight: 600; color: #2b8a3e; margin-bottom: 4px;"></div>
    <div id="fitNotes" style="font-size: 11px; color: #868e96;"></div>
  </div>

  <div id="mixMatchResults" style="display: none;">
    <p style="font-size: 12px; font-weight: 600; margin: 12px 0 8px;">🔗 Mix-Match Suggestions</p>
    <div id="mixMatchList"></div>
  </div>

  <div id="error" class="error" style="display: none;"></div>

  <script src="src/popup.js"></script>
</body>
</html>
